<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7C8W87NTJC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-7C8W87NTJC');
    </script>

    <title>MADRES CAMPEONAS - YAAVS</title>
    
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#ff3385">
    <link rel="icon" href="https://assets.zyrosite.com/EnigzBPrgZr5GxnU/mesa-de-trabajo-23-8-9UuOY2sWU5il4Fc7.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* =======================================================
           RESET Y FONDO BASE
           ======================================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #031333;
            background-image: url('https://assets.zyrosite.com/EnigzBPrgZr5GxnU/mesa-de-trabajo-4-copia-9AO3CJrkjhBwxENg.png');
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
            color: #ffffff;
            overflow-x: hidden;
            text-align: center;
        }

        .overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
            min-height: 100vh;
            padding-bottom: 60px;
            position: relative;
            z-index: 10;
        }

        .btn-regresar-inicio {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #fff;
            text-decoration: none;
            background: rgba(255, 51, 133, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 999px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .btn-regresar-inicio:hover {
            background: #ff3385;
            transform: translateY(-2px);
        }
        @media (max-width: 480px) {
            .btn-regresar-inicio {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 0.72rem;
            }
        }

        /* =======================================================
           EFECTOS DE CORAZONES FLOTANTES
           ======================================================= */
        #hearts-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            color: #ff3385;
            opacity: 0;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 51, 133, 0.8);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100px) scale(1.5) rotate(360deg); opacity: 0; }
        }

        /* =======================================================
           ANIMACIONES DE ENTRADA
           ======================================================= */
        .animate-in {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.8s; }
        .delay-4 { animation-delay: 1.1s; }

        /* =======================================================
           CABECERA Y LOGOS
           ======================================================= */
        .header-logos {
            padding: 40px 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .logo-yaavs { 
            height: clamp(35px, 5vw, 45px); 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); 
        }
        .logo-campana { 
            height: clamp(140px, 20vw, 190px); 
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8)) drop-shadow(0 0 20px rgba(34, 255, 94, 0.4)); 
            animation: floatLogo 4s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* LOGO MADRES CAMPEONAS */
        .img-madres-logo {
            width: 90%;
            max-width: 650px;
            height: auto;
            margin: 20px auto 40px;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.7)) drop-shadow(0 0 15px rgba(255, 51, 133, 0.5));
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 10px 20px rgba(0,0,0,0.7)) drop-shadow(0 0 15px rgba(255, 51, 133, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8)) drop-shadow(0 0 30px rgba(255, 51, 133, 0.8)); transform: scale(1.03); }
        }

        /* =======================================================
           SECCIÓN DE MOTIVACIÓN Y PREMIOS
           ======================================================= */
        .motivacion-container {
            max-width: 800px;
            margin: 0 auto 30px auto;
            padding: 0 20px;
        }
        .motivacion-rosa-wrap {
            background: linear-gradient(135deg, rgba(255, 51, 133, 0.92) 0%, rgba(200, 24, 92, 0.88) 50%, rgba(255, 105, 180, 0.9) 100%);
            border-radius: 16px;
            padding: 22px 24px;
            margin: 0 auto;
            max-width: 720px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }
        .frase-motivadora {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 400;
            line-height: 1.6;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.45);
            margin-bottom: 0;
        }
        .motivacion-rosa-wrap .frase-motivadora strong {
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .frase-destacada {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 700;
            color: #ff3385;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            border-top: 2px solid rgba(255, 51, 133, 0.5);
            border-bottom: 2px solid rgba(255, 51, 133, 0.5);
            padding: 15px 0;
            margin: 30px 0;
            background: linear-gradient(90deg, transparent, rgba(255,51,133,0.1), transparent);
        }

        .premio-bloque { margin: 40px 0; }
        .premio-num {
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 10px 25px rgba(255, 51, 133, 0.6), 0 5px 10px rgba(0,0,0,0.8);
        }
        .premio-texto {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            color: #ff3385;
            text-transform: uppercase;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            margin-top: -5px;
            letter-spacing: 2px;
        }

        /* =======================================================
           GRID DE GANADORAS (MURO DE HONOR)
           ======================================================= */
        .muro-titulo {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 900;
            color: #ffffff;
            margin: 60px 0 30px;
            text-shadow: 0 0 20px #ff3385;
            letter-spacing: 2px;
        }
        .grid-ganadoras {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .tarjeta-ganadora {
            background: rgba(255, 51, 133, 0.15);
            border: 1px solid rgba(255, 51, 133, 0.4);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .tarjeta-ganadora:hover {
            transform: translateY(-5px);
            background: rgba(255, 51, 133, 0.3);
            border-color: #ff3385;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px rgba(255, 51, 133, 0.5);
        }
        .icono-corona {
            background: linear-gradient(135deg, #ff3385, #ff99cc);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(255, 51, 133, 0.8);
            flex-shrink: 0;
        }
        .info-ganadora { text-align: left; }
        .nombre-ganadora {
            font-weight: 800;
            font-size: 1.1rem;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .clave-ganadora {
            font-weight: 400;
            font-size: 0.85rem;
            color: #ffb3d1;
            letter-spacing: 1px;
        }

        .loader {
            color: #ff3385;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 40px 0;
            display: none;
        }

        .wrap-ver-mas {
            max-width: 1200px;
            margin: 28px auto 0;
            padding: 0 20px;
        }
        .btn-ver-mas {
            display: none;
            margin: 0 auto;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #ff3385, #cc0066);
            border: 2px solid rgba(255, 255, 255, 0.45);
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(255, 51, 133, 0.45);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-ver-mas:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255, 51, 133, 0.55);
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <div class="overlay">

        <a href="https://www.ganayaavs.com/" class="btn-regresar-inicio" id="btn-regresar-inicio">
            <i class="fa-solid fa-house"></i> Regresar al inicio
        </a>
        
        <div class="header-logos animate-in">
            <img src="https://assets.zyrosite.com/EnigzBPrgZr5GxnU/recurso-6-dRbQkWfZFlakSEfc.png" alt="YAAVS" class="logo-yaavs">
            <img src="https://assets.zyrosite.com/EnigzBPrgZr5GxnU/mesa-de-trabajo-23-8-9UuOY2sWU5il4Fc7.png" alt="Conexión de Campeones" class="logo-campana">
        </div>

        <div class="animate-in delay-1">
            <img src="https://assets.zyrosite.com/EnigzBPrgZr5GxnU/logo-madres-campeonas-8-onXhj1VrrXykr3ke.png" alt="Madres Campeonas Logo" class="img-madres-logo">
        </div>

        <div class="motivacion-container animate-in delay-2">
            <div class="motivacion-rosa-wrap">
                <p class="frase-motivadora">
                    <strong>YAAVS</strong> reconoce a las <strong>YAAVSERS jefas de familia</strong> que demostraron disciplina, constancia y resultados sobresalientes.
                </p>
            </div>
        </div>

        <div class="premio-bloque animate-in delay-3">
            <div class="premio-num">300</div>
            <div class="premio-texto">PLAYERAS ROSAS<br>EN JUEGO</div>
        </div>

        <div class="animate-in delay-4">
            <h2 class="muro-titulo"><i class="fa-solid fa-ranking-star"></i> LISTA OFICIAL DE GANADORAS</h2>
            
            <div id="loader" class="loader">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Cargando lista de campeonas...
            </div>

            <div id="grid-ganadoras" class="grid-ganadoras"></div>

            <div class="wrap-ver-mas">
                <button type="button" id="btn-ver-mas" class="btn-ver-mas" aria-controls="grid-ganadoras">
                    Ver siguientes 20 <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        // ====================================================================
        // EFECTOS VISUALES AL CARGAR LA PÁGINA (CONFETI Y CORAZONES)
        // ====================================================================
        document.addEventListener('DOMContentLoaded', () => {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff3385', '#ff99cc', '#ffffff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff3385', '#ff99cc', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            const heartsContainer = document.getElementById('hearts-container');
            const heartIcons = ['💖', '💕', '💗', '💓', '💝'];
            
            function createHeart() {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                const duration = Math.random() * 5 + 5;
                heart.style.animationDuration = duration + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heartsContainer.appendChild(heart);
                setTimeout(() => { heart.remove(); }, duration * 1000);
            }

            setInterval(createHeart, 300);
            cargarDatos();
        });

        // ====================================================================
        // CONFIGURACIÓN DE TU EXCEL DE GANADORAS ACTUALIZADA
        // ====================================================================
        const URL_CSV_GANADORAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWGXF15TN3Cx9hxI-rRmGx616a4c0iU7lx04360CQfAA_x4tl9ZWra_0qxQ1XIGxS3uegHT0QIgzfY/pub?gid=1715360995&single=true&output=csv"; 
        
        // COLUMNAS CORREGIDAS (A = 0, B = 1, C = 2, D = 3, E = 4)
        const COL_CLAVE = 0;  // Fila A: Clave
        const COL_NOMBRE = 3; // Fila E: Nombre

        const grid = document.getElementById('grid-ganadoras');
        const loader = document.getElementById('loader');
        const btnVerMas = document.getElementById('btn-ver-mas');

        const GANADORAS_POR_PAGINA = 20;
        let todasLasGanadoras = [];
        let indiceMostradas = 0;

        function escaparHtml(texto) {
            const d = document.createElement('div');
            d.textContent = texto;
            return d.innerHTML;
        }

        function crearTarjetaGanadora(ganadora, indexGlobal) {
            const tarjeta = document.createElement('div');
            tarjeta.className = 'tarjeta-ganadora animate-in';
            tarjeta.style.animationDelay = Math.min(indexGlobal * 0.04, 1.2) + 's';
            const nombre = escaparHtml(ganadora.nombre);
            const clave = escaparHtml(ganadora.clave);
            tarjeta.innerHTML = `
                <div class="icono-corona"><i class="fa-solid fa-crown"></i></div>
                <div class="info-ganadora">
                    <div class="nombre-ganadora">${nombre}</div>
                    <div class="clave-ganadora">ID: ${clave}</div>
                </div>
            `;
            return tarjeta;
        }

        function actualizarBotonVerMas() {
            if (indiceMostradas >= todasLasGanadoras.length) {
                btnVerMas.style.display = 'none';
                return;
            }
            btnVerMas.style.display = 'inline-flex';
        }

        function agregarSiguienteLote() {
            const fin = Math.min(indiceMostradas + GANADORAS_POR_PAGINA, todasLasGanadoras.length);
            for (let i = indiceMostradas; i < fin; i++) {
                grid.appendChild(crearTarjetaGanadora(todasLasGanadoras[i], i));
            }
            indiceMostradas = fin;
            actualizarBotonVerMas();
        }

        btnVerMas.addEventListener('click', function () {
            agregarSiguienteLote();
        });

        function parseCSV(text) {
            const result = [];
            let row = [];
            let cell = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (inQuotes) {
                    if (char === '"') {
                        if (i + 1 < text.length && text[i + 1] === '"') { cell += '"'; i++; } 
                        else { inQuotes = false; }
                    } else { cell += char; }
                } else {
                    if (char === '"') { inQuotes = true; } 
                    else if (char === ',') { row.push(cell); cell = ''; } 
                    else if (char === '\n') { row.push(cell); result.push(row); row = []; cell = ''; } 
                    else if (char !== '\r') { cell += char; }
                }
            }
            if (cell || text[text.length - 1] === ',') row.push(cell);
            if (row.length > 0) result.push(row);
            return result;
        }

        async function cargarDatos() {
            try {
                loader.style.display = "block";
                const response = await fetch(URL_CSV_GANADORAS);
                const dataText = await response.text();
                const filas = parseCSV(dataText);
                
                const listaFinal = [];
                
                // Saltamos la fila 0 asumiendo que son los títulos
                for (let i = 1; i < filas.length; i++) {
                    const fila = filas[i];
                    // Validamos que la fila sea lo suficientemente larga para tener la columna E y que no esté vacía
                    if (fila.length > COL_NOMBRE && fila[COL_NOMBRE] && fila[COL_NOMBRE].trim() !== "") {
                        listaFinal.push({
                            nombre: fila[COL_NOMBRE].trim(),
                            clave: fila[COL_CLAVE] ? fila[COL_CLAVE].trim() : "SIN CLAVE"
                        });
                    }
                }

                loader.style.display = "none";
                todasLasGanadoras = listaFinal;
                grid.innerHTML = "";
                indiceMostradas = 0;
                agregarSiguienteLote();

            } catch (error) {
                console.error("Error cargando Google Sheets:", error);
                loader.style.display = "none";
                btnVerMas.style.display = "none";
                grid.innerHTML = "<p style='grid-column: 1/-1; color: #ff3385; font-size: 1.2rem;'>Ocurrió un error al conectar con la lista oficial. Intenta recargar la página.</p>";
            }
        }
    </script>
</body>
</html>
