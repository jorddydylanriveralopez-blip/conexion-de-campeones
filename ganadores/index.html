            filtrosSorteo.classList.toggle('is-busy', ocupado);

            const d = document.createElement('div');

            const p = new URLSearchParams(location.search);
            const s = p.get('sorteo') || p.get('s');

            const cfg = SORTEOS[n];
            document.getElementById('hero-badge').textContent = cfg.badge;

            document.title = cfg.docTitle;

                b.classList.toggle('active', Number(b.dataset.sorteo) === n);

        function claseKit(kit) {
            const k = (kit || '').toUpperCase();
            if (k.includes('BÁSICO') || k.includes('BASICO')) return 'badge-basico';
            if (k.includes('ELITE')) return 'badge-elite';
            return 'badge-pro';
        }

        function aplicarFiltros(conAnimacion = false) {
            const q = busqueda.trim().toUpperCase();
            filtrados = todos.filter((g) => {
                if (ligaActiva !== 'todas' && g.liga !== ligaActiva) return false;
                if (!q) return true;
                return (
                    (g.nombre || '').toUpperCase().includes(q) ||
                    (g.clave || '').toUpperCase().includes(q) ||
                    (g.ticket || '').toUpperCase().includes(q) ||
                    (g.municipio || '').toUpperCase().includes(q)
                );
            });
            indice = 0;
            grid.innerHTML = '';
            emptyMsg.style.display = filtrados.length ? 'none' : 'block';
            statVisibles.textContent = String(filtrados.length);
            actualizarBoton();
            animarProximoLote = conAnimacion;
            if (filtrados.length) agregarLote();
            animarProximoLote = false;
        }

        function crearTarjeta(g, i, conAnimacion) {
            const el = document.createElement('div');
            el.className = `tarjeta liga-${g.liga.replace(/\s/g, '')}`;
            if (conAnimacion) {
                el.classList.add('tarjeta--entrada');
                el.style.animationDelay = Math.min(i * 0.04, 1.1) + 's';
            } else {
                el.style.animationDelay = Math.min(i * 0.03, 0.9) + 's';
            }
            const nombreVisible =
                g.nombre && g.nombre.toUpperCase() !== (g.clave || '').toUpperCase()
                    ? g.nombre
                    : '';
            const municipioHtml = g.municipio
                ? `<div class="municipio"><i class="fa-solid fa-location-dot"></i> ${escapar(g.municipio)}</div>`
                : '';
            const ticketHtml =
                g.ticket && g.ticket !== g.clave
                    ? `<div class="ticket-line">${escapar(g.ticket)}</div>`
                    : '';
            el.innerHTML = `
                <div class="icono-trofeo"><i class="fa-solid fa-trophy"></i></div>
                <div class="info">
                    ${nombreVisible ? `<div class="nombre">${escapar(nombreVisible)}</div>` : ''}
                    ${municipioHtml}
                    <div class="meta">
                        <span class="badge badge-liga">${escapar(g.liga)}</span>
                        <span class="badge ${claseKit(g.kit)}">${escapar(g.kit)}</span>
                    </div>
                    <div class="clave">Clave: ${escapar(g.clave)}</div>
                    ${ticketHtml}
                </div>
            `;
            return el;
        }

        function agregarLote() {
            const fin = Math.min(indice + POR_PAGINA, filtrados.length);
            const animar = animarProximoLote;
            for (let i = indice; i < fin; i++) {
                grid.appendChild(crearTarjeta(filtrados[i], i - indice, animar));
            }
            indice = fin;
            actualizarBoton();
        }

        async function obtenerDatosSorteo(n) {
            if (cacheSorteos[n]) return cacheSorteos[n];
            const cfg = SORTEOS[n];
            const res = await fetch(cfg.url + '?v=20260710_sorteo5');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            cacheSorteos[n] = data;
            return data;
        }

        function resetFiltrosUI() {
            busqueda = '';
            document.getElementById('busqueda').value = '';
            ligaActiva = 'todas';
            document.querySelectorAll('#filtros-liga .filtro-btn').forEach((b) => {
                b.classList.toggle('active', b.dataset.liga === 'todas');
            });
        }

        function actualizarBoton() {
            btnVerMas.style.display = indice < filtrados.length ? 'inline-block' : 'none';
        }

        btnVerMas.addEventListener('click', agregarLote);

        document.getElementById('busqueda').addEventListener('input', (e) => {
            busqueda = e.target.value;
            aplicarFiltros();
        });

        document.getElementById('filtros-liga').addEventListener('click', (e) => {
            const btn = e.target.closest('.filtro-btn');
            if (!btn) return;
            document.querySelectorAll('.filtro-btn').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            ligaActiva = btn.dataset.liga;
            aplicarFiltros();
        });

        function lanzarConfetti() {
            const end = Date.now() + 2500;
            (function burst() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#22ff5e', '#00e5ff', '#ffd700', '#ffffff'],
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#22ff5e', '#00e5ff', '#ffd700', '#ffffff'],
                });
                if (Date.now() < end) requestAnimationFrame(burst);
            })();
        }

        async function cargarSorteo(n, opts = {}) {
            const inicial = opts.inicial === true;
            if (!inicial && (n === sorteoActivo || cambioSorteoEnCurso)) return;

            cambioSorteoEnCurso = true;
            setSorteoTabsBusy(true);

            const transicion = !inicial;
            const datosPromise = obtenerDatosSorteo(n);

            if (transicion) {
                panelSorteo.classList.add('is-exiting');
                heroMeta.classList.add('hero-meta--out');
                await esperar(DURACION_SALIDA);
            }

            sorteoActivo = n;
            const url = new URL(location.href);
            if (n > 1) url.searchParams.set('sorteo', String(n));
            else url.searchParams.delete('sorteo');
            history.replaceState({}, '', url.pathname + url.search);

            resetFiltrosUI();
            grid.innerHTML = '';
            emptyMsg.style.display = 'none';
            actualizarHero(n);

            if (transicion) {
                panelSorteo.classList.remove('is-exiting');
                heroMeta.classList.remove('hero-meta--out');
            }

            panelSorteo.classList.add('is-loading');
            loaderOverlay.setAttribute('aria-hidden', 'false');

            try {
                const data = await datosPromise;
                todos = Array.isArray(data.ganadores) ? data.ganadores : [];
                if (!todos.length) throw new Error('Sin ganadores');
                document.getElementById('stat-total').textContent = String(todos.length);

                panelSorteo.classList.remove('is-loading');
                loaderOverlay.setAttribute('aria-hidden', 'true');

                if (transicion) {
                    panelSorteo.classList.add('is-entering');
                    heroMeta.classList.add('hero-meta--in');
                    aplicarFiltros(true);
                    await esperar(DURACION_ENTRADA);
                    panelSorteo.classList.remove('is-entering');
                    heroMeta.classList.remove('hero-meta--in');
                } else {
                    aplicarFiltros(true);
                    if (!confettiHecho) {
                        confettiHecho = true;
                        lanzarConfetti();
                    }
                }
            } catch (err) {
                console.error(err);
                panelSorteo.classList.remove('is-loading', 'is-exiting', 'is-entering');
                heroMeta.classList.remove('hero-meta--out', 'hero-meta--in');
                loaderOverlay.setAttribute('aria-hidden', 'true');
                loader.style.display = 'block';
                loader.innerHTML =
                    '<p style="color:#ff3366;">No se pudo cargar la lista. Recarga la página.</p>';
            } finally {
                setSorteoTabsBusy(false);
                cambioSorteoEnCurso = false;
            }
        }

        document.getElementById('filtros-sorteo').addEventListener('click', (e) => {
            const btn = e.target.closest('.filtro-btn');
            if (!btn) return;
            const n = Number(btn.dataset.sorteo);
            if (n === sorteoActivo) return;
            cargarSorteo(n);
        });

        document.addEventListener('DOMContentLoaded', () => {
            cargarSorteo(sorteoDesdeURL(), { inicial: true });
        });
    </script>
</body>
</html>
